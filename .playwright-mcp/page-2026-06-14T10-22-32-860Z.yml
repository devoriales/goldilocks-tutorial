            - generic [ref=e78]:
              - 'heading "Lesson 01: Understanding Gateway API Architecture" [level=1] [ref=e79]'
              - blockquote [ref=e80]:
                - paragraph [ref=e81]: "Duration: ~15 minutes"
              - heading "Overview" [level=2] [ref=e82]
              - paragraph [ref=e83]: Before migrating from Ingress to the Gateway API, you need to understand why Kubernetes introduced a new API for managing external traffic and how its architecture differs from what you already know. This lesson breaks down the Gateway API resource model, explains the role-oriented design philosophy, and shows you exactly where the old Ingress API falls short.
              - heading "Learning Objectives" [level=2] [ref=e84]
              - paragraph [ref=e85]: "By the end of this lesson, you will:"
              - list [ref=e86]:
                - listitem [ref=e87]: Understand why the Ingress API is being superseded by the Gateway API
                - listitem [ref=e88]: Learn the Gateway API resource model (GatewayClass -> Gateway -> xRoute)
                - listitem [ref=e89]: Understand role-oriented design and how it maps to real team structures
                - listitem [ref=e90]: Compare Ingress vs Gateway API side-by-side
              - heading "Prerequisites" [level=2] [ref=e91]
              - list [ref=e92]:
                - listitem [ref=e93]: Basic Kubernetes knowledge (Pods, Services, Namespaces)
                - listitem [ref=e94]: Familiarity with Ingress resources and how they route traffic
              - separator [ref=e95]
              - heading "The Problem with Ingress" [level=2] [ref=e96]
              - heading "The ingress-nginx End-of-Life Announcement" [level=3] [ref=e97]
              - paragraph [ref=e98]: On November 11, 2025, the Kubernetes community announced that the ingress-nginx controller — the most widely deployed Ingress controller in the Kubernetes ecosystem — is reaching End-of-Life in March 2026.
              - paragraph [ref=e99]: "After the EOL date:"
              - list [ref=e100]:
                - listitem [ref=e101]: No more releases — no new versions will be published
                - listitem [ref=e102]: No bug fixes — existing bugs will not be patched
                - listitem [ref=e103]: No security patches — newly discovered CVEs will go unaddressed
                - listitem [ref=e104]: Repositories become read-only — no new code will be merged into kubernetes/ingress-nginx
              - paragraph [ref=e105]: Existing Helm charts and container images will remain available, and currently running ingress-nginx deployments will continue to function. Nothing will suddenly break on that date. But from that point forward, you are running an unmaintained controller in production — and every day that passes increases your exposure to unpatched vulnerabilities.
              - blockquote [ref=e106]:
                - paragraph [ref=e107]: "Important distinction: The Ingress API itself (networking.k8s.io/v1) is not being removed from Kubernetes. It is feature-frozen, meaning it will continue to work but will not receive new capabilities. What is being retired is specifically the ingress-nginx controller — the community-maintained NGINX-based implementation in the kubernetes/ingress-nginx repository. Other Ingress controllers (such as F5's separately maintained NGINX Ingress Controller) are not affected by this announcement."
              - heading "How the Ingress API Became the Standard" [level=3] [ref=e108]
              - paragraph [ref=e109]: "When the Ingress API was introduced in Kubernetes 1.1 (2015), it solved a real problem: there was no standard way to route external HTTP traffic to services inside a cluster. Before Ingress, every team had to cobble together NodePort services, cloud load balancers, or custom proxy configurations."
              - paragraph [ref=e110]: "The Ingress resource gave the community a single, portable abstraction for HTTP routing. You could write one Ingress manifest and — in theory — run it with any Ingress controller. The simplicity was appealing: one resource kind, a few fields for hosts and paths, and you were routing traffic."
              - paragraph [ref=e111]: Adoption was massive. The ingress-nginx controller, backed by NGINX, became the default choice for most Kubernetes clusters. It was free, well-documented, and it worked.
              - paragraph [ref=e112]: "But the simplicity that made Ingress easy to adopt also made it impossible to extend cleanly. As real-world requirements grew more complex — header-based routing, traffic splitting, rate limiting, mutual TLS — the Ingress spec had no way to express them. The community's answer was annotations: controller-specific key-value pairs bolted onto the Ingress resource metadata."
              - paragraph [ref=e113]: "This led to several fundamental problems:"
              - list [ref=e114]:
                - listitem [ref=e115]: Annotation sprawl — Every controller invented its own annotations. A manifest written for ingress-nginx would not work with Traefik or HAProxy without rewriting the annotations. Portability, the original promise of Ingress, was lost.
                - listitem [ref=e116]: "Single resource, too many responsibilities — The Ingress resource tried to be everything: the listener configuration, the routing rules, and the TLS termination config, all in one object. This made it impossible to separate concerns across different teams."
                - listitem [ref=e117]: No role separation — A platform engineer and an application developer both had to edit the same Ingress resource. There was no way to say "the platform team controls the listener, and the app team controls the routes."
                - listitem [ref=e118]: Limited protocol support — Ingress was designed for HTTP and HTTPS only. TCP, UDP, and gRPC routing required entirely custom solutions outside the spec.
              - 'heading "Gateway API: The Successor" [level=3] [ref=e119]'
              - paragraph [ref=e120]: The Kubernetes community recognized these limitations and started the Gateway API project (originally developed under the name "Service APIs" in SIG-Network) to design a proper replacement. Gateway API v1.0 — with HTTPRoute at GA status — was released in October 2023, and it has been the recommended path for new deployments since.
              - paragraph [ref=e121]: "Gateway API is not a minor revision of Ingress. It is a fundamentally different design built around three key principles:"
              - list [ref=e122]:
                - listitem [ref=e123]: Expressiveness — Native support for header-based routing, traffic weighting, request mirroring, URL rewrites, and more — no annotations required.
                - listitem [ref=e124]: Role-oriented design — Separate resource types for separate teams. Infrastructure providers manage GatewayClass resources. Platform engineers manage Gateway resources. Application developers manage HTTPRoute resources. Each role controls only what it should.
                - listitem [ref=e125]: Portability — Core routing features are part of the specification itself, not controller-specific annotations. A manifest that works with Traefik will work with Envoy Gateway, Istio, or any conformant implementation.
              - paragraph [ref=e126]: We will explore the Gateway API resource model in detail in the next section of this lesson.
              - heading "Why You Should Plan Your Migration Now" [level=3] [ref=e127]
              - paragraph [ref=e128]: "This is not a call to panic. Your ingress-nginx deployments will not stop working overnight. But the timeline is real:"
              - list [ref=e129]:
                - listitem [ref=e130]: The community has been clear about the March 2026 EOL
                - listitem [ref=e131]: After that date, every new Kubernetes CVE that touches NGINX or the controller code will be your team's problem to assess, patch, and rebuild
                - listitem [ref=e132]: The longer you wait, the more Ingress resources accumulate and the larger the migration becomes
                - listitem [ref=e133]: Gateway API is GA, well-supported, and the clear direction for Kubernetes traffic management
              - paragraph [ref=e134]: The practical move is to start learning Gateway API now, plan your migration path, and begin moving workloads while you still have the safety net of a maintained ingress-nginx controller to fall back on.
              - paragraph [ref=e135]: That is exactly what this tutorial series will guide you through — starting with understanding the architecture in this lesson, and ending with a fully migrated bookstore application running on the Gateway API with Traefik.
              - heading "Annotation Sprawl in Practice" [level=3] [ref=e136]
              - paragraph [ref=e137]: "To make the problem concrete, here is a realistic ingress-nginx manifest for the bookstore application. This is the kind of Ingress resource that accumulates over time as teams add features one annotation at a time:"
              - generic [ref=e138]:
                - code [ref=e140]: "apiVersion: networking.k8s.io/v1 kind: Ingress metadata: name: bookstore-ingress namespace: bookstore annotations: nginx.ingress.kubernetes.io/ssl-redirect: \"true\" nginx.ingress.kubernetes.io/proxy-body-size: \"8m\" nginx.ingress.kubernetes.io/proxy-read-timeout: \"60\" nginx.ingress.kubernetes.io/proxy-send-timeout: \"60\" nginx.ingress.kubernetes.io/limit-rps: \"10\" nginx.ingress.kubernetes.io/cors-allow-origin: \"https://bookstore.local\" nginx.ingress.kubernetes.io/cors-allow-methods: \"GET, POST, PUT, DELETE, OPTIONS\" nginx.ingress.kubernetes.io/enable-cors: \"true\" spec: ingressClassName: nginx tls: - hosts: - bookstore.local secretName: bookstore-tls rules: - host: bookstore.local http: paths: - path: / pathType: Prefix backend: service: name: bookstore-frontend port: number: 80 - path: /api pathType: Prefix backend: service: name: bookstore-api port: number: 8080"
                - button "Copy" [ref=e141] [cursor=pointer]
              - paragraph [ref=e142]: Read through those annotations. Every one of them is ingress-nginx specific. If you switched to Traefik, HAProxy, or any other Ingress controller, you would need to rewrite every annotation — the keys, the values, and sometimes the behavior they produce. That is the portability promise of Ingress, broken in practice.
              - paragraph [ref=e143]: "But portability is only part of the problem. Notice how this single resource mixes concerns that belong to completely different teams:"
              - list [ref=e144]:
                - listitem [ref=e145]: Infrastructure decisions (SSL redirect, TLS termination) that a platform engineer should own
                - listitem [ref=e146]: Traffic policy (rate limiting, timeouts, body size limits) that might be set by an SRE team
                - listitem [ref=e147]: Application routing (path-to-service mapping) that belongs to the application developer
                - listitem [ref=e148]: Security policy (CORS headers) that could come from a security team's requirements
              - paragraph [ref=e149]: All of these concerns are flattened into one annotation block on one resource. There is no way to grant an application developer permission to change their routes without also giving them the ability to modify rate limits or disable SSL redirects. In a small team this is manageable. At scale — with dozens of services and multiple teams — it becomes a source of misconfiguration and a code review bottleneck.
              - paragraph [ref=e150]: This is the problem that Gateway API was designed to solve, and you will see exactly how it solves it when we examine the resource model next.
              - separator [ref=e151]
              - heading "Gateway API Resource Model" [level=2] [ref=e152]
              - paragraph [ref=e153]: The Gateway API replaces the single Ingress resource with a three-layer model. Each layer is a separate Kubernetes resource type, owned by a different team, with clearly defined responsibilities.
              - heading "The Three-Layer Architecture" [level=3] [ref=e154]
              - button "Copy" [ref=e157] [cursor=pointer]
              - 'heading "GatewayClass: The Infrastructure Provider Layer" [level=3] [ref=e158]'
              - paragraph [ref=e159]: A GatewayClass defines the controller implementation that will manage Gateways. Think of it as a "driver" for a type of load balancer. Just as a Kubernetes StorageClass tells the cluster which storage provisioner to use, a GatewayClass tells the cluster which gateway controller to use.
              - paragraph [ref=e160]: GatewayClass resources are typically installed by the infrastructure provider. When you install Traefik with Gateway API support, Traefik automatically creates a GatewayClass that references its own controller. You do not usually need to create this resource yourself — but you need to understand it because your Gateway will reference it by name.
              - generic [ref=e161]:
                - code [ref=e163]: "# ✅ GatewayClass — installed by the infrastructure provider (Traefik) apiVersion: gateway.networking.k8s.io/v1 kind: GatewayClass metadata: name: traefik spec: controllerName: traefik.io/gateway-controller"
                - button "Copy" [ref=e164] [cursor=pointer]
              - paragraph [ref=e165]: "The controllerName field is the key piece. It tells Kubernetes: \"Any Gateway that references this GatewayClass should be implemented by the Traefik controller.\" Multiple GatewayClasses can exist in the same cluster — for example, one for Traefik handling external traffic and another for a service mesh handling internal traffic."
              - 'heading "Gateway: The Cluster Operator Layer" [level=3] [ref=e166]'
              - paragraph [ref=e167]: A Gateway is where a cluster operator defines the actual network entry points into the cluster. It specifies listeners — each listener declares a port, a protocol, and optionally a hostname to accept traffic on.
              - paragraph [ref=e168]: The Gateway references a GatewayClass by name via the gatewayClassName field. This is how the Gateway knows which controller should implement it. A single Gateway can have multiple listeners — for example, one for HTTP on port 80 and another for HTTPS on port 443.
              - paragraph [ref=e169]:
                - text: "This Gateway declares: \"Using the Traefik controller, open an HTTP listener on port 80 that accepts traffic for"
                - code [ref=e170]: bookstore.local.
                - text: "\" The cluster operator controls which ports are exposed and which hostnames are accepted — but they do not need to know anything about the application's routing rules. That responsibility belongs to the next layer."
              - blockquote [ref=e171]:
                - strong [ref=e172]: Note on listener ports
                - text: ": The"
                - code [ref=e173]: port
                - text: value in a Gateway listener must match the port that the controller actually listens on. Some controllers (like Traefik) use non-privileged internal ports (e.g., 8000 instead of 80) and map them to standard ports via the Kubernetes Service. In that case, the Gateway listener port must match the internal port, not the external one. You will see this in practice in Lesson 05.
              - paragraph [ref=e174]
              - 'heading "HTTPRoute: The Application Developer Layer" [level=3] [ref=e175]'
              - paragraph [ref=e176]: An HTTPRoute is where application developers define how incoming requests should be routed to their backend services. It attaches to a Gateway using the parentRefs field, and then specifies routing rules based on hostnames, paths, headers, query parameters, or HTTP methods.
              - paragraph [ref=e177]: This is the resource that application developers interact with most. They do not need to know how the Gateway is configured or which controller is running — they just need to know the name of the Gateway to attach to.
              - generic [ref=e178]:
                - code [ref=e180]: "# ✅ HTTPRoute — created by the application developer apiVersion: gateway.networking.k8s.io/v1 kind: HTTPRoute metadata: name: bookstore-api-route namespace: bookstore spec: parentRefs: - name: bookstore-gateway hostnames: - bookstore.local rules: - matches: - path: type: PathPrefix value: /api backendRefs: - name: bookstore-api port: 8080"
                - button "Copy" [ref=e181] [cursor=pointer]
              - paragraph [ref=e182]:
                - text: "This HTTPRoute says: \"Attach to bookstore-gateway. For requests to"
                - code [ref=e183]: bookstore.local
                - text: with a path starting with
                - code [ref=e184]: /api
                - text: ", route them to the bookstore-api service on port 8080.\" The application developer does not need to touch the Gateway, modify any annotations, or coordinate with the platform team to add a new route."
              - heading "How the Layers Connect" [level=3] [ref=e185]
              - paragraph [ref=e186]: "The relationship flows in one direction:"
              - list [ref=e187]:
                - listitem [ref=e188]: The GatewayClass exists first — it defines the available controller (Traefik).
                - listitem [ref=e189]: The Gateway references the GatewayClass and opens listeners on specific ports and hostnames.
                - listitem [ref=e190]: The HTTPRoute attaches to the Gateway and defines the routing rules for its specific service.
              - paragraph [ref=e191]: Each layer can be managed independently. The infrastructure provider installs the GatewayClass once. The cluster operator creates Gateways as needed. Application developers create HTTPRoute objects to route traffic to their services — without needing to modify or even have access to the Gateway resource.
              - paragraph [ref=e192]: This separation is what makes the Gateway API fundamentally different from Ingress. Instead of one resource that everyone has to edit, you have three resource types with clear ownership boundaries. The next section — Role-Oriented Design — explores how these boundaries map to real team structures and Kubernetes RBAC policies.
              - separator [ref=e193]
              - heading "Role-Oriented Design" [level=2] [ref=e194]
              - paragraph [ref=e195]: "The Gateway API resource model is not just a technical refactoring — it is an organizational one. Each of the three resource types maps to a distinct team role with specific responsibilities. This is by design: the Gateway API specification was built around the idea that different people in an organization should control different parts of the traffic configuration, and the API boundaries should enforce that separation."
              - heading "The Three Roles" [level=3] [ref=e196]
              - paragraph [ref=e197]: In many organizations, the Infrastructure Provider and Cluster Operator roles are handled by the same platform team. That is fine — the important boundary is between the Cluster Operator (Gateway) and the Application Developer (HTTPRoute), because that is where the day-to-day ownership split happens.
              - heading "Why Role Separation Matters" [level=3] [ref=e198]
              - paragraph [ref=e199]: It maps naturally to Kubernetes RBAC. You can create RBAC policies that grant application developers permission to create and modify HTTPRoute resources in their own namespaces — without giving them any access to Gateway or GatewayClass resources. With Ingress, this was impossible because infrastructure concerns and routing rules lived in the same resource. If a developer could edit the Ingress to change a route, they could also modify the TLS configuration or rate-limiting annotations.
              - paragraph [ref=e200]: It reduces the blast radius of mistakes. When a developer writes a bad routing rule in an HTTPRoute, the worst that happens is their own service gets misrouted. They cannot accidentally change the listener port, disable TLS termination, or affect another team's traffic. The Gateway resource — which controls those infrastructure-level settings — is not something they can touch.
              - paragraph [ref=e201]: It scales with team growth. In a small team with a handful of services, having everyone edit one Ingress manifest is manageable. But when you have ten teams deploying fifty services, the single Ingress resource becomes a bottleneck. Every team's routing change goes through the same file, the same review process, and the same deployment pipeline. With Gateway API, each team manages their own HTTPRoutes independently. There is no merge conflict, no waiting for another team's PR to be reviewed first.
              - paragraph [ref=e202]: "It eliminates the coordination tax. Under the Ingress model, adding a new service route often required a platform engineer to update the shared Ingress resource or at least review the change. With Gateway API, the platform team sets up the Gateway once and application teams self-serve from that point forward. The contract is simple: \"Attach your HTTPRoute to bookstore-gateway and define your routing rules. You do not need to open a ticket.\""
              - heading "How This Works for the Bookstore" [level=3] [ref=e203]
              - paragraph [ref=e204]: "Here is how the separation plays out concretely in the bookstore application we will build throughout this series:"
              - list [ref=e205]:
                - listitem [ref=e206]:
                  - strong [ref=e207]: "Step 1:"
                  - text: The platform team sets up the infrastructure (once). The platform team installs Traefik (which creates the GatewayClass), then creates a Gateway named bookstore-gateway that opens an HTTP listener on port 80 for bookstore.local This is done once and rarely changes.
                - listitem [ref=e208]:
                  - strong [ref=e209]: "Step 2:"
                  - text: Each application team creates their own routes (independently). The frontend team creates an HTTPRoute that sends / traffic to the bookstore-frontend service. The API team creates a separate HTTPRoute that sends /api traffic to the bookstore-api service. Each team writes, tests, and deploys their HTTPRoute on their own schedule.
                - listitem [ref=e210]:
                  - strong [ref=e211]: "Step 3:"
                  - text: Teams do not block each other. If the API team needs to add a new path (
                  - code [ref=e212]: /api/v2
                  - text: ) or split traffic between two backend versions, they update their own HTTPRoute. The frontend team is not involved. The platform team is not involved. No shared resource needs to be edited, reviewed, or redeployed.
              - paragraph [ref=e213]:
                - text: This is a meaningful improvement over the Ingress model, where both the
                - code [ref=e214]: /
                - text: and
                - code [ref=e215]: /api
                - text: routes lived in the same resource, and any change to either route required touching that single manifest — often owned by a team that did not write the application being routed.
              - heading "Contrast with Ingress" [level=3] [ref=e216]
              - paragraph [ref=e217]: "With the Ingress model, the bookstore setup from the previous section looked like this in practice:"
              - list [ref=e218]:
                - listitem [ref=e219]: One Ingress resource containing all routes, TLS config, and policy annotations
                - listitem [ref=e220]: Every team that needed to add or change a route had to modify the same resource
                - listitem [ref=e221]: RBAC could only be applied at the Ingress resource level — either a team could edit the whole thing or nothing
                - listitem [ref=e222]: Adding a new service meant coordinating with whoever owned the Ingress manifest
              - paragraph [ref=e223]: With Gateway API, that single resource is split into pieces that match how teams actually work. The platform team owns the Gateway. Each application team owns their HTTPRoutes. RBAC boundaries align with resource boundaries, and resource boundaries align with team boundaries. That is the design philosophy in one sentence.
              - heading "Ingress vs Gateway API Comparison" [level=2] [ref=e224]
              - paragraph [ref=e225]: The following table provides a side-by-side comparison of key traffic management features across the Ingress API and the Gateway API. Use this as a quick reference to see which capabilities are native to each API and where Traefik extends the Gateway API with its own custom resources.
              - table [ref=e227]:
                - rowgroup [ref=e228]:
                  - row "Feature Ingress Gateway API" [ref=e229]:
                    - columnheader "Feature" [ref=e230]
                    - columnheader "Ingress" [ref=e231]
                    - columnheader "Gateway API" [ref=e232]
                - rowgroup [ref=e233]:
                  - row "Path-based routing Built-in (basic path + pathType) ✅ Built-in (PathPrefix, Exact match types)" [ref=e234]:
                    - cell "Path-based routing" [ref=e235]
                    - cell "Built-in (basic path + pathType)" [ref=e236]
                    - cell "✅ Built-in (PathPrefix, Exact match types)" [ref=e237]
                  - row "Host-based routing Built-in (host field in rules) ✅ Built-in (hostnames field on HTTPRoute and Gateway listeners)" [ref=e238]:
                    - cell "Host-based routing" [ref=e239]
                    - cell "Built-in (host field in rules)" [ref=e240]
                    - cell "✅ Built-in (hostnames field on HTTPRoute and Gateway listeners)" [ref=e241]
                  - row "Header-based routing Annotation (vendor-specific) ✅ Native HTTPRoute matches with headers conditions" [ref=e242]:
                    - cell "Header-based routing" [ref=e243]
                    - cell "Annotation (vendor-specific)" [ref=e244]
                    - cell "✅ Native HTTPRoute matches with headers conditions" [ref=e245]
                  - row "Traffic splitting / weighting Annotation or not supported ✅ Native backendRefs with weight field per backend" [ref=e246]:
                    - cell "Traffic splitting / weighting" [ref=e247]
                    - cell "Annotation or not supported" [ref=e248]
                    - cell "✅ Native backendRefs with weight field per backend" [ref=e249]
                  - row "TLS termination Built-in (basic, configured on the Ingress) ✅ Built-in with listener-level TLS config on the Gateway" [ref=e250]:
                    - cell "TLS termination" [ref=e251]
                    - cell "Built-in (basic, configured on the Ingress)" [ref=e252]
                    - cell "✅ Built-in with listener-level TLS config on the Gateway" [ref=e253]
                  - row "Cross-namespace routing Not supported ✅ Native with ReferenceGrant resource" [ref=e254]:
                    - cell "Cross-namespace routing" [ref=e255]
                    - cell "Not supported" [ref=e256]
                    - cell "✅ Native with ReferenceGrant resource" [ref=e257]
                  - row "URL rewriting Annotation (vendor-specific) ✅ Native HTTPRoute URLRewrite filter" [ref=e258]:
                    - cell "URL rewriting" [ref=e259]
                    - cell "Annotation (vendor-specific)" [ref=e260]
                    - cell "✅ Native HTTPRoute URLRewrite filter" [ref=e261]
                  - row "Request mirroring Annotation (limited, vendor-specific) ✅ Native HTTPRoute RequestMirror filter" [ref=e262]:
                    - cell "Request mirroring" [ref=e263]
                    - cell "Annotation (limited, vendor-specific)" [ref=e264]
                    - cell "✅ Native HTTPRoute RequestMirror filter" [ref=e265]
                  - row "Rate limiting Annotation (vendor-specific) 🔧 Traefik Middleware CRD (not in Gateway API core spec)" [ref=e266]:
                    - cell "Rate limiting" [ref=e267]
                    - cell "Annotation (vendor-specific)" [ref=e268]
                    - cell "🔧 Traefik Middleware CRD (not in Gateway API core spec)" [ref=e269]
