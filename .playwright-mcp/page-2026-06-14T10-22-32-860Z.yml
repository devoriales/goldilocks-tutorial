                    - cell "Query param routing - Like header-based routing" [ref=e275]
                    - cell "Vendor-annotation-only in Ingress" [ref=e276]
                    - cell "✅ Native in Gateway API" [ref=e277]
              - blockquote [ref=e278]:
                - paragraph [ref=e279]: "Legend: ✅ = Native Gateway API feature — portable across any conformant implementation (Traefik, Envoy Gateway, Istio, etc.). 🔧 = Traefik-specific feature — implemented via Traefik custom resources and not part of the Gateway API specification."
                - paragraph [ref=e280]: Features marked with 🔧 are not a limitation of the Gateway API design — the spec intentionally provides an ExtensionRef mechanism that lets implementations add capabilities beyond the core. We will cover Traefik-specific extensions like rate limiting, circuit breakers, and custom middleware in later lessons when we add production-grade traffic policies to the bookstore application.
              - heading "What Gateway API Does Not Cover" [level=2] [ref=e281]
              - paragraph [ref=e282]: "The comparison table above shows that most common routing features — path matching, host matching, header-based routing, traffic splitting, TLS termination — are native to the Gateway API specification. But the core spec deliberately stops short of covering several production requirements that teams encounter regularly:"
              - list [ref=e283]:
                - listitem [ref=e284]: Rate limiting — no built-in mechanism to throttle request rates per client or per route
                - listitem [ref=e285]: Authentication and authorization — no native resource for enforcing auth policies at the gateway level
                - listitem [ref=e286]: Circuit breaking — no built-in fault tolerance mechanism to stop sending traffic to failing backends
                - listitem [ref=e287]: IP allowlisting / denylisting — no native way to restrict traffic by source IP address
                - listitem [ref=e288]: Advanced header manipulation — the core spec provides basic RequestHeaderModifier and ResponseHeaderModifier filters, but not the full flexibility needed for security headers, custom CORS policies, or complex rewrite logic
              - paragraph [ref=e289]: These omissions are intentional. The Gateway API designers chose to standardize the features that every implementation can agree on, and leave implementation-specific capabilities to an extension mechanism.
              - heading "How Traefik Fills These Gaps" [level=3] [ref=e290]
              - paragraph [ref=e291]: Traefik provides a Middleware custom resource (traefik.io/v1alpha1) that covers each of the gaps listed above. Available Middleware types include rateLimit, headers (for CORS and security headers), basicAuth, forwardAuth, circuitBreaker, ipAllowList, addPrefix, and stripPrefix.
              - paragraph [ref=e292]: "To connect a Traefik Middleware to a Gateway API HTTPRoute, you use the ExtensionRef filter — a filter type defined in the Gateway API specification specifically for referencing implementation-specific extensions. Here is the pattern:"
              - paragraph [ref=e293]: "Step 1: Reference the Middleware in your HTTPRoute using ExtensionRef."
              - generic [ref=e294]:
                - code [ref=e296]: "# Inside an HTTPRoute rule — reference a Traefik Middleware via ExtensionRef # Use Case: Apply rate limiting to the bookstore API route apiVersion: gateway.networking.k8s.io/v1 kind: HTTPRoute metadata: name: bookstore-api-route namespace: bookstore spec: parentRefs: - name: bookstore-gateway rules: - matches: - path: type: PathPrefix value: /api filters: - type: ExtensionRef extensionRef: group: traefik.io kind: Middleware name: rate-limit backendRefs: - name: bookstore-api port: 8080"
                - button "Copy" [ref=e297] [cursor=pointer]
              - paragraph [ref=e298]: "Step 2: Define the Traefik Middleware CRD."
              - generic [ref=e299]:
                - code [ref=e301]: "# Traefik Middleware — limits API requests to 10 per second with burst capacity of 20 # Use Case: Protect the bookstore API from excessive traffic apiVersion: traefik.io/v1alpha1 kind: Middleware metadata: name: rate-limit namespace: bookstore spec: rateLimit: average: 10 burst: 20"
                - button "Copy" [ref=e302] [cursor=pointer]
              - paragraph [ref=e303]:
                - text: The
                - code [ref=e304]: ExtensionRef
                - text: "filter connects the two: the"
                - code [ref=e305]: HTTPRoute
                - text: references the Middleware by group, kind, and name, and Traefik applies that middleware to matching requests. From the Gateway API's perspective,
                - code [ref=e306]: ExtensionRef
                - text: is a standard filter type — it is part of the core specification. What is Traefik-specific is the Middleware resource it points to.
              - heading "The ExtensionRef Pattern Is by Design" [level=3] [ref=e307]
              - paragraph [ref=e308]:
                - text: It is worth emphasizing that
                - code [ref=e309]: ExtensionRef
                - text: "is not a workaround or a hack. It is the intended mechanism for Gateway API implementations to add capabilities beyond the core specification. The design philosophy is:"
              - list [ref=e310]:
                - listitem [ref=e311]: The core spec provides portability for common features (routing, TLS, traffic splitting) — these work identically across any conformant implementation.
                - listitem [ref=e312]:
                  - text: The
                  - code [ref=e313]: ExtensionRef
                  - text: filter provides extensibility for implementation-specific features (rate limiting, auth, circuit breaking) — these are tied to a specific controller but integrated cleanly into the HTTPRoute resource.
              - paragraph [ref=e314]:
                - text: This means your
                - code [ref=e315]: HTTPRoute
                - text: structure, your
                - code [ref=e316]: parentRefs
                - text: ", and your routing rules remain portable. Only the"
                - code [ref=e317]: ExtensionRef
                - text: filters are implementation-specific, and they are clearly marked as such in the manifest.
              - 'heading "A Genuine Gap: Cookie-Based Routing" [level=3] [ref=e318]'
              - paragraph [ref=e319]:
                - text: One area where neither the Gateway API core specification nor Traefik provides first-class support is cookie-based routing. The Gateway API
                - code [ref=e320]: HTTPRoute
                - text: spec does not include a cookie match type, and Traefik does not add one through its extensions.
              - paragraph [ref=e321]: "A partial workaround exists: you can use the HTTPRoute headers match type to match on the Cookie header as a raw string. But this is fragile — cookie headers contain multiple key-value pairs, and matching on the full header string is not the same as matching on a specific cookie name and value. If your use case requires cookie-based routing (for example, A/B testing based on a session cookie), be aware that this remains a gap that requires careful handling."
              - heading "Looking Ahead" [level=3] [ref=e322]
              - paragraph [ref=e323]: "We will implement rate limiting, CORS, authentication, and other Traefik Middleware configurations hands-on in Lesson 08: Advanced Routing. For now, the key takeaway is that the Gateway API core spec covers the most common routing needs natively, and Traefik extends it through a well-defined extension mechanism for everything else."
              - heading "Gateway API Implementations" [level=2] [ref=e324]
              - paragraph [ref=e325]: "The Gateway API is an open specification — it is not tied to any single vendor or proxy. Multiple implementations exist, each bringing different strengths. The following table lists the major ones:"
              - table [ref=e327]:
                - rowgroup [ref=e328]:
                  - row "Implementation Description" [ref=e329]:
                    - columnheader "Implementation" [ref=e330]
                    - columnheader "Description" [ref=e331]
                - rowgroup [ref=e332]:
                  - row "Traefik Mature Gateway API support (graduated conformance), extensive middleware ecosystem, simple Helm chart installation. This is the implementation we use throughout this tutorial." [ref=e333]:
                    - cell "Traefik" [ref=e334]
                    - cell "Mature Gateway API support (graduated conformance), extensive middleware ecosystem, simple Helm chart installation. This is the implementation we use throughout this tutorial." [ref=e335]
                  - row "Envoy Gateway The Envoy-based reference implementation backed by the Envoy community. Cloud-native, high performance, strong extensibility." [ref=e336]:
                    - cell "Envoy Gateway" [ref=e337]
                    - cell "The Envoy-based reference implementation backed by the Envoy community. Cloud-native, high performance, strong extensibility." [ref=e338]
                  - row "Istio Service mesh that also implements the Gateway API. Best suited for teams already invested in the Istio ecosystem." [ref=e339]:
                    - cell "Istio" [ref=e340]
                    - cell "Service mesh that also implements the Gateway API. Best suited for teams already invested in the Istio ecosystem." [ref=e341]
                  - row "Cilium eBPF-based networking with Gateway API support. A good fit for teams already using Cilium for CNI and network policy." [ref=e342]:
                    - cell "Cilium" [ref=e343]
                    - cell "eBPF-based networking with Gateway API support. A good fit for teams already using Cilium for CNI and network policy." [ref=e344]
                  - row "Kong API gateway with Gateway API support. Strong in API management features like developer portals and analytics." [ref=e345]:
                    - cell "Kong" [ref=e346]
                    - cell "API gateway with Gateway API support. Strong in API management features like developer portals and analytics." [ref=e347]
                  - row "HAProxy Ingress HAProxy-based implementation with Gateway API support. Known for high performance and reliability." [ref=e348]:
                    - cell "HAProxy Ingress" [ref=e349]
                    - cell "HAProxy-based implementation with Gateway API support. Known for high performance and reliability." [ref=e350]
                  - row "Contour Envoy-based, backed by VMware/Broadcom. Focused on simplicity and a clean operational model." [ref=e351]:
                    - cell "Contour" [ref=e352]
                    - cell "Envoy-based, backed by VMware/Broadcom. Focused on simplicity and a clean operational model." [ref=e353]
              - paragraph [ref=e354]: A full list of implementations and their conformance status is maintained at gateway-api.sigs.k8s.io/implementations.
              - heading "Why Traefik for This Tutorial" [level=3] [ref=e355]
              - paragraph [ref=e356]: "Traefik is one of several excellent Gateway API implementations. We chose it for this tutorial for specific reasons:"
              - list [ref=e357]:
                - listitem [ref=e358]: Graduated Gateway API conformance — Traefik has passed the full Gateway API conformance test suite, meaning the core resources (GatewayClass, Gateway, HTTPRoute) work exactly as the spec defines.
                - listitem [ref=e359]: Rich Middleware CRDs — As shown in the previous section, Traefik provides custom Middleware resources for rate limiting, authentication, CORS, circuit breaking, and more. This lets us explore both the portable core spec and practical production extensions in one tutorial.
                - listitem [ref=e360]: Simple installation — A single Helm chart with Gateway API support enabled gets you from zero to a working gateway. We will cover this in Lesson 05.
                - listitem [ref=e361]: Excellent documentation — Traefik's docs are thorough and include Gateway API-specific guides.
                - listitem [ref=e362]: Good balance for learning — Traefik is feature-rich enough to cover real-world scenarios but not so complex that it overwhelms the core Gateway API concepts we are teaching.
                - listitem [ref=e363]: Active community — Traefik has a large user base and active maintenance, which means issues get addressed and new Gateway API features are adopted quickly.
              - paragraph [ref=e364]: That said, one of the most important things about the Gateway API is its portability. The core resources you learn in this tutorial — GatewayClass, Gateway, HTTPRoute, and the patterns for connecting them — transfer directly to any conformant implementation. If your organization uses Envoy Gateway, Istio, or Cilium instead of Traefik, the routing rules, the role-oriented design, and the resource model are identical. Only the Traefik-specific parts (Middleware CRDs referenced via ExtensionRef) would need to be replaced with equivalent extensions from your chosen implementation.
              - separator [ref=e365]
              - heading "Resources" [level=2] [ref=e366]
              - list [ref=e367]:
                - listitem [ref=e368]: Ingress NGINX Retirement Announcement — The official Kubernetes blog post announcing the ingress-nginx controller End-of-Life in March 2026
                - listitem [ref=e369]: Gateway API Official Documentation — The specification, guides, and reference docs for the Kubernetes Gateway API
                - listitem [ref=e370]: Gateway API Concepts Overview — Detailed explanation of the Gateway API resource model (GatewayClass, Gateway, HTTPRoute)
                - listitem [ref=e371]: Traefik Gateway API Documentation — Traefik's guide to configuring Gateway API resources and Middleware extensions
                - listitem [ref=e372]: Gateway API Implementations — Full list of Gateway API implementations and their conformance status
              - heading "Verification" [level=2] [ref=e373]
              - paragraph [ref=e374]: "No cluster-level verification needed for this lesson. Confirm your understanding by answering:"
              - list [ref=e375]:
                - listitem [ref=e376]: What are the three core Gateway API resource types, and what does each one control?
                - listitem [ref=e377]: Which team role (Infrastructure Provider, Cluster Operator, Application Developer) is responsible for each resource type?
